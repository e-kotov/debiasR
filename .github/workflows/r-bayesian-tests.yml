name: Bayesian tests

on:
  workflow_dispatch:

jobs:
  bayesian-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      RSTAN_NUM_THREADS: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Set up package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: |
            any::devtools
            any::testthat
            any::rstan

      - name: Run rstanarm Bayesian smoke tests
        timeout-minutes: 15
        run: Rscript scripts/run_bayesian_tests.R rstanarm-smoke

      - name: Run latent Stan smoke tests
        timeout-minutes: 10
        run: Rscript scripts/run_bayesian_tests.R latent-smoke
