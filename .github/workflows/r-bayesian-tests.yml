name: Bayesian tests

on:
  workflow_dispatch:

jobs:
  bayesian-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Set up package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: |
            any::devtools
            any::testthat
            any::rstanarm

      - name: Run Bayesian tests
        run: |
          Rscript -e 'devtools::load_all(".", quiet = TRUE); testthat::test_file("tests/testthat/test-adjust-multilevel-bayes.R", reporter = "summary")'
