name: Fast deterministic tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  fast-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Set up package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: |
            any::devtools
            any::testthat

      - name: Run fast deterministic tests
        run: Rscript scripts/run_fast_tests.R
