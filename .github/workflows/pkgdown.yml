name: pkgdown site

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build pkgdown site
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up package and site dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: |
            any::pkgdown
            any::quarto
            any::knitr
            any::rmarkdown
            any::ggplot2
            any::ggthemes
            any::showtext
            any::tidyverse
            any::forcats
            any::tidyr
            any::readr
            any::stringr
            any::purrr
            any::patchwork
            any::lme4
            github::walkerke/mapgl
            github::de-bias/debiasRdata

      - name: Install local package
        run: R CMD INSTALL .

      - name: Build pkgdown site
        shell: bash
        run: |
          mv NEWS.md /tmp/debiasR-NEWS.md
          # Run quarto render manually so we can see any hidden errors in the log
          quarto render vignettes/v08-visualising-flows.qmd || true
          Rscript -e 'pkgdown::build_site(
            pkg = ".",
            override = list(destination = "site"),
            new_process = FALSE,
            install = TRUE
          )'

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy pkgdown site
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
